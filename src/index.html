<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);
    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  .app-shell {
    position: relative;
    z-index: 2;
    height: 100vh;
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 18px;
    padding: 16px;
  }

  .sidebar {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .sidebar-header {
    padding: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo-mark {
    width: 24px; height: 24px; border-radius: 7px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }
  .logo h1 { font-size: 18px; font-weight: 600; color: var(--c-text-bright); }
  .model-label { font-size: 11px; color: var(--c-text-dim); letter-spacing: 0.03em; }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .ctrl-btn:hover { background: var(--c-surface-hover); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .thread-list {
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  .thread-item {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    padding: 10px;
    cursor: pointer;
  }
  .thread-item.active {
    border-color: rgba(74,222,128,0.3);
    box-shadow: inset 0 0 0 1px rgba(74,222,128,0.15);
  }
  .thread-item:hover { background: var(--c-surface-hover); }

  .thread-row {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 8px;
  }
  .thread-title { font-size: 13px; color: var(--c-text-bright); line-height: 1.3; word-break: break-word; }
  .thread-actions { display: flex; gap: 6px; }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--c-text-dim);
    cursor: pointer;
    font-size: 12px;
  }
  .icon-btn:hover { color: var(--c-text-bright); }
  .thread-time { font-size: 11px; color: var(--c-text-dim); margin-top: 6px; }
  .thread-edit { margin-top: 8px; display: flex; gap: 6px; }
  .thread-edit input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    color: var(--c-text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
  }

  .main-panel {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    background: rgba(255,255,255,0.01);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  header {
    width: 100%;
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  .portal-stack {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 0;
  }

  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
  }
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }
  .viewport-wrap::before { box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim); z-index: 3; animation: glow-breathe-1 3s ease-in-out infinite; }
  .viewport-wrap::after { box-shadow: 0 0 40px 8px var(--glow-dim); z-index: 2; animation: glow-breathe-2 4s ease-in-out infinite; }
  .viewport-glow { inset: -6px; border-radius: 22px; box-shadow: 0 0 80px 20px var(--glow-dim); z-index: 1; animation: glow-breathe-3 5s ease-in-out infinite; }

  @keyframes glow-breathe-1 { 0%,100%{opacity:.6;}50%{opacity:1;} }
  @keyframes glow-breathe-2 { 0%,100%{opacity:.4;}50%{opacity:.8;} }
  @keyframes glow-breathe-3 { 0%,100%{opacity:.2;}50%{opacity:.5;} }

  .viewport-wrap.processing::before { animation-duration: .8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: .3; }
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow { animation: none; }
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: .3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: .2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: .1; }

  video { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 18px; background: #0a0a10; transform: scaleX(-1); position: relative; z-index: 2; }

  .waveform-wrap { width: 100%; max-width: 480px; height: 52px; margin-top: 16px; flex-shrink: 0; }
  #waveform { width: 100%; height: 100%; display: block; }

  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 4px;
  }
  .msg { padding: 10px 14px; border-radius: 12px; font-size: 13.5px; line-height: 1.55; max-width: 85%; }
  .msg.user { align-self: flex-end; background: rgba(74,222,128,0.08); color: #b0d8c0; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--c-surface); color: var(--c-text); border-bottom-left-radius: 4px; }
  .msg .meta { font-size: 10.5px; color: var(--c-text-dim); margin-top: 5px; }

  .loading-dots { display: inline-flex; gap: 4px; align-items: center; height: 1.55em; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(74,222,128,0.5); animation: dot-bounce 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: .15s; }
  .loading-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot-bounce { 0%,60%,100% { opacity:.3; transform:translateY(0);} 30% { opacity:1; transform:translateY(-4px);} }

  .controls {
    width: 100%;
    max-width: 640px;
    padding: 12px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .state-indicator { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--c-text-dim); }
  .state-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--glow); box-shadow: 0 0 8px var(--glow-dim); }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse .6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }
  @keyframes dot-pulse { 0%,100% { opacity:1; transform:scale(1);} 50% { opacity:.4; transform:scale(.8);} }

  .on-device-pill { font-size: 10px; color: var(--c-text-dim); text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
  .on-device-pill svg { width: 10px; height: 10px; }

  @media (max-width: 980px) {
    .app-shell { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
    .sidebar { max-height: 40vh; }
  }
</style>
</head>
<body x-data="parlorApp()" x-init="init()">

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark"></div>
        <h1>Parlor</h1>
      </div>
      <div class="model-label">Gemma 4 E2B</div>
      <button class="ctrl-btn" style="margin-top:10px; width: 100%;" @click="createThread" :disabled="isLoadingThreads">+ New Thread</button>
    </div>

    <div class="thread-list">
      <template x-if="isLoadingThreads">
        <div class="thread-time">Loading threads…</div>
      </template>
      <template x-for="thread in threads" :key="thread.id">
        <div class="thread-item" :class="{ active: activeThreadId === thread.id }" @click="selectThread(thread.id)">
          <div class="thread-row">
            <div class="thread-title" x-text="thread.title || 'Untitled thread'"></div>
            <div class="thread-actions" @click.stop>
              <button class="icon-btn" title="Edit" @click="startEditTitle(thread)">✎</button>
              <button class="icon-btn" title="Delete" @click="deleteThread(thread.id)">🗑</button>
            </div>
          </div>
          <div class="thread-time" x-text="formatTime(thread.updated_at)"></div>
          <div class="thread-edit" x-show="isEditingTitle && editingThreadId === thread.id" @click.stop>
            <input type="text" x-model="editingTitle" @keydown.enter.prevent="saveEditTitle(thread.id)" @keydown.escape.prevent="cancelEditTitle">
            <button class="ctrl-btn" @click="saveEditTitle(thread.id)">Save</button>
          </div>
        </div>
      </template>
    </div>
  </aside>

  <section class="main-panel">
    <header>
      <div class="model-label" x-text="activeThreadTitle"></div>
      <div id="status" class="status-pill disconnected" x-text="statusText"></div>
    </header>

    <div class="portal-stack">
      <div id="viewportWrap" class="viewport-wrap loading">
        <div class="viewport-glow"></div>
        <video id="video" autoplay muted playsinline></video>
      </div>

      <div class="waveform-wrap">
        <canvas id="waveform"></canvas>
      </div>

      <div id="messages" class="transcript">
        <template x-for="msg in messages" :key="msg.id">
          <div class="msg" :class="msg.role">
            <template x-if="msg.loading">
              <span class="loading-dots"><span></span><span></span><span></span></span>
            </template>
            <template x-if="!msg.loading">
              <span x-text="msg.content"></span>
            </template>
            <div class="meta" x-show="msg.meta" x-text="msg.meta"></div>
          </div>
        </template>
      </div>

      <div class="controls">
        <button id="cameraToggle" class="ctrl-btn active" @click="toggleCamera" :class="{ active: cameraEnabled }" x-text="cameraEnabled ? 'Camera On' : 'Camera Off'"></button>
        <div class="state-indicator">
          <div id="stateDot" class="dot loading"></div>
          <span id="stateText">Loading...</span>
        </div>
        <span class="on-device-pill">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
          On-device
        </span>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
function parlorApp() {
  return {
    threads: [],
    activeThreadId: null,
    messages: [],
    isEditingTitle: false,
    editingThreadId: null,
    editingTitle: '',
    isLoadingThreads: false,
    isLoadingMessages: false,
    statusText: 'Disconnected',
    statusClass: 'disconnected',

    ws: null,
    mediaStream: null,
    myvad: null,
    cameraEnabled: true,
    audioCtx: null,
    currentSource: null,
    state: 'loading',
    ignoreIncomingAudio: false,
    speakingStartedAt: 0,

    streamSampleRate: 24000,
    streamNextTime: 0,
    streamSources: [],
    streamTtsTime: null,

    analyser: null,
    micSource: null,
    waveformCanvas: null,
    waveformCtx: null,
    BAR_COUNT: 40,
    BAR_GAP: 3,
    waveformRAF: null,
    ambientPhase: 0,

    get activeThreadTitle() {
      const t = this.threads.find(thread => thread.id === this.activeThreadId);
      return t ? (t.title || 'Untitled thread') : 'No thread selected';
    },

    formatTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString();
    },

    async init() {
      this.video = document.getElementById('video');
      this.stateDot = document.getElementById('stateDot');
      this.stateText = document.getElementById('stateText');
      this.viewportWrap = document.getElementById('viewportWrap');
      this.statusEl = document.getElementById('status');
      this.waveformCanvas = document.getElementById('waveform');
      this.waveformCtx = this.waveformCanvas.getContext('2d');

      this.initWaveformCanvas();
      window.addEventListener('resize', () => this.initWaveformCanvas());

      await this.startCamera();
      await this.loadThreads();
      this.connect();

      this.myvad = await vad.MicVAD.new({
        getStream: async () => new MediaStream(this.mediaStream.getAudioTracks()),
        positiveSpeechThreshold: 0.5,
        negativeSpeechThreshold: 0.25,
        redemptionMs: 600,
        minSpeechMs: 300,
        preSpeechPadMs: 300,
        onSpeechStart: () => this.handleSpeechStart(),
        onSpeechEnd: (audio) => this.handleSpeechEnd(audio),
        onVADMisfire: () => console.log('VAD misfire (too short)'),
        onnxWASMBasePath: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
        baseAssetPath: 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/',
      });
      this.myvad.start();

      const initAudio = () => {
        this.ensureAudioCtx();
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        document.removeEventListener('click', initAudio);
        document.removeEventListener('keydown', initAudio);
      };
      document.addEventListener('click', initAudio);
      document.addEventListener('keydown', initAudio);
      this.ensureAudioCtx();

      this.setState('listening');
      this.drawWaveform();
    },

    async api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      if (!res.ok) throw new Error(await res.text());
      if (res.status === 204) return null;
      return res.json();
    },

    async loadThreads() {
      this.isLoadingThreads = true;
      try {
        const data = await this.api('/api/threads');
        this.threads = data.threads || [];
        if (!this.activeThreadId && this.threads.length) {
          await this.selectThread(this.threads[0].id);
        }
      } finally {
        this.isLoadingThreads = false;
      }
    },

    async selectThread(threadId) {
      if (!threadId || this.activeThreadId === threadId) return;
      this.activeThreadId = threadId;
      await this.loadMessages(threadId);
    },

    async loadMessages(threadId) {
      this.isLoadingMessages = true;
      try {
        const data = await this.api(`/api/threads/${threadId}/messages`);
        this.messages = (data.messages || []).map(m => this.mapMessage(m));
        this.$nextTick(() => {
          const el = document.getElementById('messages');
          if (el) el.scrollTop = el.scrollHeight;
        });
      } finally {
        this.isLoadingMessages = false;
      }
    },

    mapMessage(msg) {
      let meta = '';
      if (msg.llm_time != null) meta = `LLM ${msg.llm_time}s`;
      if (msg.tts_time != null) meta = meta ? `${meta} · TTS ${msg.tts_time}s` : `TTS ${msg.tts_time}s`;
      return {
        id: msg.id,
        role: msg.role,
        content: msg.role === 'user' ? (msg.transcription || msg.content) : msg.content,
        meta,
        loading: false,
      };
    },

    async createThread() {
      const data = await this.api('/api/threads', { method: 'POST', body: JSON.stringify({}) });
      const thread = data.thread;
      this.threads.unshift(thread);
      await this.selectThread(thread.id);
    },

    startEditTitle(thread) {
      this.isEditingTitle = true;
      this.editingThreadId = thread.id;
      this.editingTitle = thread.title || '';
    },

    cancelEditTitle() {
      this.isEditingTitle = false;
      this.editingThreadId = null;
      this.editingTitle = '';
    },

    async saveEditTitle(threadId) {
      const title = this.editingTitle.trim();
      if (!title) return this.cancelEditTitle();
      const data = await this.api(`/api/threads/${threadId}`, {
        method: 'PATCH',
        body: JSON.stringify({ title }),
      });
      this.threads = this.threads.map(t => t.id === threadId ? data.thread : t);
      this.cancelEditTitle();
    },

    async deleteThread(threadId) {
      const idx = this.threads.findIndex(t => t.id === threadId);
      if (idx === -1) return;
      const fallback = this.threads[idx + 1]?.id || this.threads[idx - 1]?.id || null;
      this.threads = this.threads.filter(t => t.id !== threadId);
      if (this.activeThreadId === threadId) {
        this.activeThreadId = null;
        this.messages = [];
      }
      await this.api(`/api/threads/${threadId}`, { method: 'DELETE' });
      if (fallback) {
        await this.selectThread(fallback);
      }
    },

    connect() {
      this.ws = new WebSocket(`ws://${location.host}/ws`);
      this.ws.onopen = () => {
        this.setStatus('connected', 'Connected');
        if (this.state !== 'loading') this.setState('listening');
      };
      this.ws.onclose = () => {
        this.setStatus('disconnected', 'Disconnected');
        setTimeout(() => this.connect(), 2000);
      };
      this.ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.thread_id) {
          this.activeThreadId = msg.thread_id;
          const hasThread = this.threads.some(t => t.id === msg.thread_id);
          if (!hasThread) this.loadThreads();
        }
        if (msg.type === 'text') {
          if (msg.transcription) {
            for (let i = this.messages.length - 1; i >= 0; i--) {
              const m = this.messages[i];
              if (m.role === 'user' && m.loading) {
                m.loading = false;
                m.content = msg.transcription;
                break;
              }
            }
          }
          this.addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
        } else if (msg.type === 'audio_start') {
          if (this.ignoreIncomingAudio) return;
          this.streamSampleRate = msg.sample_rate || 24000;
          this.startStreamPlayback();
        } else if (msg.type === 'audio_chunk') {
          if (this.ignoreIncomingAudio) return;
          this.queueAudioChunk(msg.audio);
        } else if (msg.type === 'audio_end') {
          if (this.ignoreIncomingAudio) {
            this.ignoreIncomingAudio = false;
            this.stopPlayback();
            this.setState('listening');
            return;
          }
          const lastAssistant = [...this.messages].reverse().find(m => m.role === 'assistant');
          if (lastAssistant) lastAssistant.meta = `${lastAssistant.meta} · TTS ${msg.tts_time}s`;
        } else if (msg.type === 'error') {
          this.addMessage('assistant', msg.detail || 'Thread error', '');
        }
      };
    },

    setStatus(cls, text) {
      this.statusClass = cls;
      this.statusText = text;
      this.statusEl.className = `status-pill ${cls}`;
      this.statusEl.textContent = text;
    },

    async startCamera() {
      try {
        this.mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        });
        this.video.srcObject = this.mediaStream;
        return;
      } catch (e) { console.warn('Video+audio failed:', e.message); }

      const streams = await Promise.allSettled([
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } }),
        navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }),
      ]);
      this.mediaStream = new MediaStream();
      streams.forEach(r => { if (r.status === 'fulfilled') r.value.getTracks().forEach(t => this.mediaStream.addTrack(t)); });
      if (this.mediaStream.getVideoTracks().length) this.video.srcObject = this.mediaStream;
      if (!this.mediaStream.getAudioTracks().length) this.cameraEnabled = false;
    },

    toggleCamera() {
      this.cameraEnabled = !this.cameraEnabled;
      this.video.style.opacity = this.cameraEnabled ? 1 : 0.3;
    },

    captureFrame() {
      if (!this.cameraEnabled || !this.video.videoWidth) return null;
      const canvas = document.createElement('canvas');
      const scale = 320 / this.video.videoWidth;
      canvas.width = 320;
      canvas.height = this.video.videoHeight * scale;
      canvas.getContext('2d').drawImage(this.video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
    },

    handleSpeechStart() {
      const BARGE_IN_GRACE_MS = 800;
      if (this.state === 'speaking') {
        if (Date.now() - this.speakingStartedAt < BARGE_IN_GRACE_MS) return;
        this.stopPlayback();
        this.ignoreIncomingAudio = true;
        if (this.ws && this.ws.readyState === WebSocket.OPEN) {
          const interruptPayload = { type: 'interrupt' };
          if (this.activeThreadId) interruptPayload.thread_id = this.activeThreadId;
          this.ws.send(JSON.stringify(interruptPayload));
        }
        this.setState('listening');
      }
    },

    handleSpeechEnd(audio) {
      if (this.state !== 'listening') return;
      if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;

      const wavBase64 = this.float32ToWavBase64(audio);
      const imageBase64 = this.captureFrame();

      this.setState('processing');
      this.setStatus('processing', 'Processing');
      this.addMessage('user', '', imageBase64 ? 'with camera' : '', true);

      const payload = { audio: wavBase64 };
      if (this.activeThreadId) payload.thread_id = this.activeThreadId;
      if (imageBase64) payload.image = imageBase64;
      this.ws.send(JSON.stringify(payload));
    },

    float32ToWavBase64(samples) {
      const buf = new ArrayBuffer(44 + samples.length * 2);
      const v = new DataView(buf);
      const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
      w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
      v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
      v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
      v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
      for (let i = 0; i < samples.length; i++) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      const bytes = new Uint8Array(buf);
      let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    },

    stopPlayback() {
      for (const src of this.streamSources) {
        try { src.stop(); } catch {}
      }
      this.streamSources = [];
      this.currentSource = null;
      this.streamNextTime = 0;
    },

    ensureAudioCtx() {
      if (!this.audioCtx) {
        this.audioCtx = new AudioContext();
        this.analyser = this.audioCtx.createAnalyser();
        this.analyser.fftSize = 256;
        this.analyser.smoothingTimeConstant = 0.75;
      }
    },

    startStreamPlayback() {
      this.stopPlayback();
      this.ensureAudioCtx();
      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
      this.streamNextTime = this.audioCtx.currentTime + 0.05;
      this.speakingStartedAt = Date.now();
      this.setState('speaking');
    },

    queueAudioChunk(base64Pcm) {
      this.ensureAudioCtx();
      const bin = atob(base64Pcm);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

      const audioBuffer = this.audioCtx.createBuffer(1, float32.length, this.streamSampleRate);
      audioBuffer.getChannelData(0).set(float32);

      const source = this.audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(this.audioCtx.destination);
      source.connect(this.analyser);

      const startAt = Math.max(this.streamNextTime, this.audioCtx.currentTime);
      source.start(startAt);
      this.streamNextTime = startAt + audioBuffer.duration;

      this.streamSources.push(source);
      this.currentSource = source;

      source.onended = () => {
        const idx = this.streamSources.indexOf(source);
        if (idx !== -1) this.streamSources.splice(idx, 1);
        if (this.streamSources.length === 0 && this.state === 'speaking') {
          this.currentSource = null;
          this.setState('listening');
          this.setStatus('connected', 'Connected');
        }
      };
    },

    addMessage(role, text, meta = '', loading = false) {
      this.messages.push({ id: crypto.randomUUID(), role, content: text, meta, loading });
      this.$nextTick(() => {
        const el = document.getElementById('messages');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    initWaveformCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = this.waveformCanvas.getBoundingClientRect();
      this.waveformCanvas.width = rect.width * dpr;
      this.waveformCanvas.height = rect.height * dpr;
      this.waveformCtx.setTransform(1, 0, 0, 1, 0, 0);
      this.waveformCtx.scale(dpr, dpr);
    },

    getStateColor() {
      const colors = { listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
      return colors[this.state] || colors.loading;
    },

    drawWaveform() {
      const w = this.waveformCanvas.getBoundingClientRect().width;
      const h = this.waveformCanvas.getBoundingClientRect().height;
      this.waveformCtx.clearRect(0, 0, w, h);

      const barWidth = (w - (this.BAR_COUNT - 1) * this.BAR_GAP) / this.BAR_COUNT;
      this.waveformCtx.fillStyle = this.getStateColor();

      let dataArray = null;
      if (this.analyser) {
        dataArray = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(dataArray);
      }

      for (let i = 0; i < this.BAR_COUNT; i++) {
        let amplitude;
        if (dataArray) {
          const binIndex = Math.floor((i / this.BAR_COUNT) * dataArray.length * 0.6);
          amplitude = dataArray[binIndex] / 255;
        }
        if (!dataArray || amplitude < 0.02) {
          this.ambientPhase += 0.0001;
          const drift = Math.sin(this.ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
          amplitude = 0.03 + drift * 0.04;
        }

        const barH = Math.max(2, amplitude * (h - 4));
        const x = i * (barWidth + this.BAR_GAP);
        const y = (h - barH) / 2;

        this.waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
        this.waveformCtx.beginPath();
        const r = Math.min(barWidth / 2, barH / 2, 3);
        this.waveformCtx.roundRect(x, y, barWidth, barH, r);
        this.waveformCtx.fill();
      }

      this.waveformCtx.globalAlpha = 1;
      this.waveformRAF = requestAnimationFrame(() => this.drawWaveform());
    },

    updateSpeakingGlow() {
      if (this.state !== 'speaking' || !this.analyser) return;
      const data = new Uint8Array(this.analyser.frequencyBinCount);
      this.analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length / 255;
      const intensity = 0.3 + avg * 0.7;
      const spread = 20 + avg * 60;
      const inner = 15 + avg * 25;
      this.viewportWrap.querySelector('.viewport-glow').style.boxShadow = `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
      this.viewportWrap.style.boxShadow = `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
      requestAnimationFrame(() => this.updateSpeakingGlow());
    },

    setState(newState) {
      this.state = newState;
      this.stateDot.className = `dot ${newState}`;
      const labels = { loading: 'Loading...', listening: 'Listening', processing: 'Thinking...', speaking: 'Speaking' };
      this.stateText.textContent = labels[newState] || newState;
      this.viewportWrap.className = `viewport-wrap ${newState}`;

      if (newState !== 'speaking') {
        this.viewportWrap.style.boxShadow = '';
        this.viewportWrap.querySelector('.viewport-glow').style.boxShadow = '';
      }

      const stateVars = {
        listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
        processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
        speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
        loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
      };
      const [glow, glowDim] = stateVars[newState] || stateVars.loading;
      document.documentElement.style.setProperty('--glow', glow);
      document.documentElement.style.setProperty('--glow-dim', glowDim);

      if (newState === 'speaking') requestAnimationFrame(() => this.updateSpeakingGlow());
      if (this.myvad) this.myvad.setOptions({ positiveSpeechThreshold: newState === 'speaking' ? 0.92 : 0.5 });

      if (newState === 'listening' && this.mediaStream && this.audioCtx && this.analyser) {
        if (!this.micSource) this.micSource = this.audioCtx.createMediaStreamSource(this.mediaStream);
        try { this.micSource.connect(this.analyser); } catch {}
      } else if (this.micSource && newState !== 'listening') {
        try { this.micSource.disconnect(this.analyser); } catch {}
      }
    },
  };
}
</script>
</body>
